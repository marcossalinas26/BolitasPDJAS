version: '3.8'

services: 
  db:
    image: postgres:15
    container_name: bolitas_db
    restart: always
    environment:
      POSTGRES_USER: bolitas_user
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: bolitas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: bolitas_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data: